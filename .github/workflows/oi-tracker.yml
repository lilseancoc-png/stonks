name: Near-term OI tracker

# Twice-daily near-term open-interest scan. Sweeps the curated ticker
# universe for the front two option expirations (this week + next week),
# surfaces the top 12 OI strikes per ticker, computes ΔOI day-over-day
# against the prior trading-day snapshot, and lights up a Gamma Squeeze
# Score (0–5) with reason chips. Writes data/oi-tracker.json (current
# snapshot consumed by the UI) and data/oi-history.json (rolling
# snapshots used to compute next-run's ΔOI).
#
# Scheduling is handled externally by cron-job.org, which POSTs to the
# workflow_dispatch endpoint twice on weekdays:
#   • Pre-market scan ~08:30 America/New_York (1h before the bell)
#   • EOD scan      ~19:00 America/New_York (3h after the close)
# cron-job.org runs in ET so DST is handled by the service. The ET-hour
# gate below double-checks the slot so a DST-edge duplicate doesn't
# trigger a third run.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't cancel an in-progress scan — let it finish so we don't lose a
  # partial sweep. The next slot will simply queue.
  group: stonks-oi-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          # Accept the 08 and 19 ET slots only. 08 covers the ~08:30
          # pre-market scan; 19 covers the ~19:00 EOD scan. Any other
          # hour is rejected so a DST-shifted duplicate firing can't
          # produce a phantom mid-day scan.
          if [ "$ET_HOUR" = "08" ] || [ "$ET_HOUR" = "19" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR matches a scheduled slot — proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is outside the scheduled 08 / 19 slots — skipping this DST-duplicate firing."
          fi

  scan:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Resolve the freshest tip of the dispatched ref at checkout
          # time (rather than the SHA pinned at dispatch time, which is
          # the @v5 default). Matters when concurrency:cancel-in-progress
          # is false: a queued run that sat through another commit
          # landing on main would otherwise scan against stale code.
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Scan near-term open interest
        # No AI required — the Gamma Squeeze Score is a fully rule-based
        # 0-5 tally. The scanner also reads data/unusual.json (when
        # present) to fold "aggressive ask-side call buying today" into
        # the score, but never writes it.
        run: node scripts/scan-oi.mjs

      - name: Commit refreshed OI snapshot
        run: |
          # set -e so a failed rebase / stash pop fails the workflow
          # loudly instead of falling through to a clean-looking "no
          # changes" commit that silently dropped the freshly-scanned
          # files. Mirrors the unusual-flow.yml pattern.
          set -euo pipefail
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          # Stash ONLY the scanner's data outputs. index.html / app.js /
          # styles.css are deliberately NOT stashed and NOT regenerated
          # pre-stash: when unusual-flow.yml pushes its own regen of
          # those files between our stash and our pull, the stash-pop
          # hits a merge conflict on index.html (both sides touched the
          # inlined MANIFEST). We regenerate them ONCE post-pop so the
          # final index.html reflects the rebased+popped data state
          # cleanly.
          DATA_PATHS="data/oi-tracker.json data/oi-history.json"
          git stash push --include-untracked $DATA_PATHS || true
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          # Don't swallow stash pop errors — a silent conflict here
          # means the freshly-scanned files get discarded and the job
          # ends green with nothing committed.
          git stash pop
          # Regenerate static files NOW, after the rebase + stash pop,
          # so the inlined MANIFEST reflects whatever just landed on
          # main plus our fresh OI scan. Doing it here instead of
          # pre-stash eliminates the index.html merge conflict that
          # fires whenever unusual-flow.yml races us.
          node scripts/regen-static.mjs
          STATIC_PATHS="index.html app.js styles.css"
          git add $DATA_PATHS $STATIC_PATHS
          if ! git diff --cached --quiet; then
            SCAN_LABEL=$(TZ=America/New_York date +%H)
            if [ "$SCAN_LABEL" = "08" ]; then
              MSG="chore: pre-market OI scan $(date -u +%Y-%m-%dT%H:%MZ)"
            elif [ "$SCAN_LABEL" = "19" ]; then
              MSG="chore: EOD OI scan $(date -u +%Y-%m-%dT%H:%MZ)"
            else
              MSG="chore: OI scan $(date -u +%Y-%m-%dT%H:%MZ)"
            fi
            git commit -m "$MSG"
            git push
          else
            echo "No changes to commit."
          fi
