name: Unusual options flow

# Hourly scan for unusual options activity (volume >> open interest) across
# the curated ticker universe. Writes data/unusual.json; the commit triggers
# Vercel's GitHub integration to redeploy the static page with fresh data.
on:
  schedule:
    # Target ET market hours (9-16 ET). Each ET hour has two UTC cron entries
    # — one for EDT (UTC-4) and one for EST (UTC-5). The `check` job below
    # gates the scan to only the firings whose current ET hour is in [9, 16].
    - cron: "0 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't cancel an in-progress scan — let it finish so we don't lose a
  # partial sweep. The next hourly run will simply queue.
  group: stonks-unusual
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          # Market hours target: 09-16 ET inclusive.
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -le 16 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is within market hours — proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is outside 9-16 ET — skipping this DST-duplicate firing."
          fi

  scan:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Scan for unusual flow
        run: node scripts/scan-unusual.mjs

      - name: Commit refreshed unusual flow
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          # Pull before staging so a concurrent push from daily.yml doesn't
          # cause the rebase below to drop our newly-staged data/unusual.json.
          git stash push --include-untracked --quiet data/unusual.json || true
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git stash pop --quiet || true
          git add data/unusual.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: unusual flow scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit."
          fi
