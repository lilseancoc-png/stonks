name: Unusual options flow

# Hourly scan for unusual options activity (volume >> open interest) across
# the curated ticker universe. Writes data/unusual.json; the commit triggers
# Vercel's GitHub integration to redeploy the static page with fresh data.
#
# Also runs the lightweight heatmap refresh on the same cadence —
# data/heatmap.json's `ch` and `sp` go stale within a session and the
# refresh is a single batched Yahoo quote call (no AI), so it piggy-backs
# cleanly on this workflow's existing market-hours window. One cron
# schedule, one commit per hour.
#
# Scheduling is handled externally by cron-job.org, which POSTs to the
# workflow_dispatch endpoint hourly from 9:00 to 16:00 America/New_York
# on weekdays. cron-job.org runs in ET so DST is handled by the service.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't cancel an in-progress scan — let it finish so we don't lose a
  # partial sweep. The next hourly run will simply queue.
  group: stonks-unusual
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          # Market hours target: 09-16 ET inclusive.
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -le 16 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is within market hours — proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is outside 9-16 ET — skipping this DST-duplicate firing."
          fi

  scan:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Resolve the freshest tip of the dispatched ref at checkout
          # time (rather than the SHA pinned at dispatch time, which is
          # the @v5 default). Matters when concurrency:cancel-in-progress
          # is false: an hourly run that sat in the queue while another
          # commit landed on main would otherwise scan against stale
          # code.
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Scan for unusual flow
        env:
          # Per-flag AI explanations need a Gemini key; without one the
          # scanner silently skips the whole pipeline (see scan-unusual.mjs
          # attachFlowExplanations) and the UI renders without notes.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_FLOW_MODEL: ${{ vars.AI_FLOW_MODEL }}
        run: node scripts/scan-unusual.mjs

      - name: Refresh heatmap quotes
        # One batched Yahoo quote call rewrites data/heatmap.json's `ch`
        # and `sp` with intraday values. After 16:00 ET it also calls
        # Gemini once to write the EOD per-sector recap (`eodSummary`).
        # Reads the prior file in place — daily.yml is responsible for
        # the initial seed. Soft-fail if Yahoo flakes: the heatmap stays
        # on the prior values rather than blocking the unusual-flow commit.
        env:
          # Optional. Without it the post-close EOD recap step is skipped
          # and the heatmap renders without a summary section.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_EOD_MODEL: ${{ vars.AI_EOD_MODEL }}
        continue-on-error: true
        run: node scripts/refresh-heatmap.mjs

      - name: Regenerate static site with fresh unusual flow
        # Rebuilds index.html / app.js / styles.css from the existing data
        # files so the baked MANIFEST.unusual reflects this scan. Without
        # this, the new unusual.json sits in data/ but the deployed page
        # keeps showing the previous scan until the next daily build.
        run: node scripts/regen-static.mjs

      - name: Commit refreshed unusual flow
        run: |
          # set -e so a failed rebase / stash pop fails the workflow loudly
          # instead of falling through to a clean-looking "no changes"
          # commit that silently dropped the freshly-scanned files. The
          # `|| true` on the stash push below explicitly tolerates the
          # empty-stash case; every other git command should hard-fail.
          set -euo pipefail
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          # Pull before staging so a concurrent push from daily.yml doesn't
          # cause the rebase below to drop our newly-written scan files.
          # Stash all three scanner outputs (unusual-log.json was added with
          # the repeat-conviction feature and must be included or the rebase
          # will refuse / stash pop will silently lose it). Include the
          # regenerated static files too so the page reflects this scan.
          # flow-explanations.json is the per-contract AI cache and must
          # persist across hourly runs — without committing it the cache is
          # effectively dead and every flagged contract re-incurs an AI
          # call. Guard its inclusion since it only exists when GEMINI_API_KEY
          # is set (forks / unconfigured deployments will skip the file).
          # ai-usage.json is the shared per-day Gemini budget tracker
          # (writeAiUsageState in build.mjs). The scanner rewrites it on
          # every run via loadAiUsageState/writeAiUsageState even when
          # GEMINI_API_KEY is unset, so it must be stashed too — otherwise
          # it sits unstaged after `git stash push` and the subsequent
          # `git pull --rebase` aborts with "cannot pull with rebase: You
          # have unstaged changes", killing the whole commit step.
          # volume-flags.json / volume-history.json are produced by the
          # intraday volume + S/R break pass tacked onto the scanner — they
          # piggy-back on the same fetch and must be persisted across hourly
          # runs (volume-history.json is what the next scan reads to compute
          # hour-over-hour deltas; without it every hour reverts to "first
          # scan of the day" and never flags).
          STASH_PATHS="data/unusual.json data/unusual-history.json data/unusual-log.json data/ai-usage.json data/volume-flags.json data/volume-history.json data/heatmap.json index.html app.js styles.css"
          if [ -f data/flow-explanations.json ]; then
            STASH_PATHS="$STASH_PATHS data/flow-explanations.json"
          fi
          git stash push --include-untracked $STASH_PATHS || true
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          # Don't swallow stash pop errors — a silent conflict here means
          # the freshly-scanned files get discarded and the job ends green
          # with nothing committed, which is exactly the failure mode we
          # want to surface. The set -e above ensures we exit non-zero on
          # any conflict rather than continuing to the empty commit path.
          git stash pop
          git add $STASH_PATHS
          if ! git diff --cached --quiet; then
            git commit -m "chore: hourly refresh (flow + heatmap) $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit."
          fi
