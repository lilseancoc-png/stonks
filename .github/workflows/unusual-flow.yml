name: Unusual options flow

# Hourly scan for unusual options activity (volume >> open interest) across
# the curated ticker universe. Writes data/unusual.json; the commit triggers
# Vercel's GitHub integration to redeploy the static page with fresh data.
#
# Scheduling is handled externally by cron-job.org, which POSTs to the
# workflow_dispatch endpoint hourly from 9:00 to 16:00 America/New_York
# on weekdays. cron-job.org runs in ET so DST is handled by the service.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't cancel an in-progress scan — let it finish so we don't lose a
  # partial sweep. The next hourly run will simply queue.
  group: stonks-unusual
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          # Market hours target: 09-16 ET inclusive.
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -le 16 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is within market hours — proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "ET hour $ET_HOUR is outside 9-16 ET — skipping this DST-duplicate firing."
          fi

  scan:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Scan for unusual flow
        run: node scripts/scan-unusual.mjs

      - name: Regenerate static site with fresh unusual flow
        # Rebuilds index.html / app.js / styles.css from the existing data
        # files so the baked MANIFEST.unusual reflects this scan. Without
        # this, the new unusual.json sits in data/ but the deployed page
        # keeps showing the previous scan until the next daily build.
        run: node scripts/regen-static.mjs

      - name: Commit refreshed unusual flow
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          # Pull before staging so a concurrent push from daily.yml doesn't
          # cause the rebase below to drop our newly-written scan files.
          # Stash all three scanner outputs (unusual-log.json was added with
          # the repeat-conviction feature and must be included or the rebase
          # will refuse / stash pop will silently lose it). Include the
          # regenerated static files too so the page reflects this scan.
          git stash push --include-untracked \
            data/unusual.json data/unusual-history.json data/unusual-log.json \
            index.html app.js styles.css || true
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          # Don't swallow stash pop errors — a silent conflict here means
          # the freshly-scanned files get discarded and the job ends green
          # with nothing committed, which is exactly the failure mode we
          # want to surface.
          git stash pop
          git add data/unusual.json data/unusual-history.json data/unusual-log.json index.html app.js styles.css
          if ! git diff --cached --quiet; then
            git commit -m "chore: unusual flow scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit."
          fi
