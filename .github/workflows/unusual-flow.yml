name: Unusual options flow

# Hourly scan for unusual options activity (volume >> open interest) across
# the curated ticker universe. Writes data/unusual.json; the commit triggers
# Vercel's GitHub integration to redeploy the static page with fresh data.
on:
  schedule:
    # Top of every hour 14:00-21:00 UTC, Mon-Fri.
    # Roughly 10:00am-5:00pm ET (EDT) / 9:00am-4:00pm ET (EST).
    - cron: "0 14-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't cancel an in-progress scan — let it finish so we don't lose a
  # partial sweep. The next hourly run will simply queue.
  group: stonks-unusual
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Scan for unusual flow
        run: node scripts/scan-unusual.mjs

      - name: Commit refreshed unusual flow
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          git add data/unusual.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: unusual flow scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          else
            echo "No changes to commit."
          fi
