name: Daily build

# Regenerates the baked per-ticker JSON (chains, AI news takes, technicals)
# three times a weekday. The commit it pushes triggers Vercel's GitHub
# integration, which deploys the new static files automatically.
#
# Scheduling is handled externally by cron-job.org, which POSTs to the
# workflow_dispatch endpoint at 9:00, 12:00, and 17:00 America/New_York
# on weekdays. cron-job.org runs in ET, so it — not this workflow — is the
# single authority on the ET slots and DST. (A previous in-workflow ET-hour
# re-check was dead code: with a workflow_dispatch-only trigger it never ran.)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared across daily / unusual-flow / oi-tracker so the three never commit
  # concurrently — they queue instead of racing on shared files (ai-usage.json,
  # heatmap.json), which previously caused spurious stash-pop conflicts.
  group: stonks-data-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Resolve the freshest tip of the dispatched ref at checkout
          # time (rather than the SHA pinned at dispatch time, which is
          # the @v5 default). Matters when concurrency:cancel-in-progress
          # is false: a run that sat in the queue while a PR merged to
          # main would otherwise build against the stale dispatch SHA
          # and then push its data/ output on top of the newer main —
          # data generated by old code, committed atop new code.
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          # Cache ~/.npm keyed on package-lock.json so the per-run dependency
          # download (collapses the ~25-50s cold install of the @google/genai
          # + yahoo-finance2 + @supabase trees) becomes a ~3-8s cache restore.
          cache: "npm"

      - name: Install dependencies
        # `npm ci` installs offline from the committed lockfile (lockfileVersion
        # 3, fully pinned) — deterministic and faster than `npm install` once the
        # cache above is warm. Cache miss falls back to a normal cold install.
        run: npm ci --no-audit --no-fund

      - name: Build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Funded Tier-1 project: Flash/Flash-Lite carry 1K-4K RPM quotas, so
          # the build's per-minute AI pacer (build.mjs AI_RPM, default 100) can
          # run well above the conservative default without risking 429s. The
          # per-ticker passes run on gemini-2.5-flash-lite (4K RPM / 4M TPM).
          # Measured peak at AI_RPM=300 was 279 RPM / 890K TPM (~3.2K tok/req) —
          # i.e. the pacer itself was the binding floor on the per-ticker AI passes.
          # 600 holds peak-minute TPM at ~53% of the 4M quota and ~15% of the 4K
          # RPM quota while halving that RPM-paced floor. Token-neutral — same
          # number of calls, just spaced tighter. (Ceiling ~880 = the 70%-of-4M
          # TPM line at this token size; 750 is the aggressive option.) Leave
          # UNSET on a free-tier fork (Gemma free = 15 RPM; even 100 is too high).
          AI_RPM: "600"
          # Model selection is plumbed through Actions Variables so we can
          # swap models (Gemma free tier → Gemini 2.5 Flash-Lite on paid
          # Tier 1, etc.) without touching code. Unset = build.mjs falls
          # back to its hard-coded Gemma default.
          AI_MODEL: ${{ vars.AI_MODEL }}
          NARRATIVES_MODEL: ${{ vars.NARRATIVES_MODEL }}
          # Optional: registered BLS Public Data API access. BLS is the
          # PRIMARY source for the macro calendar (CPI/PPI/payrolls/
          # unemployment/JOLTS — FRED only mirrors these); a key lifts the
          # unauthenticated ~25 queries/day cap to 500/day + 20yr history
          # so BLS-primary never gets throttled into a stale day. Without
          # it the build still works on the unauthenticated endpoint. Free
          # key at https://www.bls.gov/developers/api_signature_v2.htm —
          # see fetchBlsSeries in scripts/build.mjs.
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          # Optional: FRED is now the FALLBACK behind BLS (macro) and NY
          # Fed EFFR (the Fed Funds rate), fetched only when the primary
          # returns empty. When set, that fallback fetch uses
          # api.stlouisfed.org (the official JSON API, not the Cloudflare-
          # fronted CSV the runner IPs intermittently get blocked from) so
          # the backstop is reliable too. Without it the fallback still
          # degrades gracefully — see fetchFredSeries in scripts/build.mjs.
          # Free key at https://fred.stlouisfed.org/docs/api/api_key.html.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Optional: when set, OpenFIGI batches use the authenticated
          # rate limit (250 req/min, 100 jobs/req → ~25k mappings/min)
          # instead of the unauthenticated 25 req/min cap. Without it,
          # 13F enrichment skips thousands of CUSIPs per run — see
          # OPENFIGI_MAX_BATCHES_UNAUTH in scripts/build.mjs. Free key
          # at https://www.openfigi.com/api.
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        run: node scripts/build.mjs

      - name: Commit refreshed site
        run: |
          set -euo pipefail
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          # Retry the commit-and-push up to 3 times so a concurrent commit
          # to main (PR merge, hourly unusual-flow scan) doesn't fail the
          # whole 4-minute build. On each attempt we fetch fresh remote
          # state, reset the index/HEAD to it (working tree keeps our
          # freshly-built artifacts intact), then re-stage and push. This
          # avoids stash/rebase entirely because the daily build wipes and
          # regenerates data/ wholesale — there's nothing local worth
          # merging from the remote, only the new commit base to land on.
          # Files owned by the hourly unusual-flow scanner and the twice-daily
          # oi-tracker. After reset --mixed the working tree still has whatever
          # build.mjs preserved from *before* the build started — but the
          # remote may have a fresher scan / OI snapshot committed while we
          # were running. Restore the remote's copies so we don't clobber them
          # (dropping a rolling oi-history snapshot), then re-run regen-static
          # so the MANIFEST in index.html matches.
          SCANNER_FILES="data/unusual.json data/unusual-history.json data/unusual-log.json data/volume-flags.json data/volume-history.json data/heatmap.json data/ai-usage.json data/flow-explanations.json data/oi-tracker.json data/oi-history.json"
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git reset --mixed "origin/$BRANCH"
            for f in $SCANNER_FILES; do
              git show "origin/$BRANCH:$f" > "$f" 2>/dev/null || true
            done
            node scripts/regen-static.mjs
            git add index.html styles.css app.js
            if [ -d data ]; then git add data; fi
            if git diff --cached --quiet; then
              echo "No changes to commit (attempt $attempt)."
              exit 0
            fi
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — remote moved, retrying."
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
