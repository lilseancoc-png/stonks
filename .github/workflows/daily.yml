name: Daily build

on:
  schedule:
    # 13:00 UTC weekdays — ~9:00am ET before the US market open.
    - cron: "0 13 * * 1-5"
    # 21:30 UTC daily — ~5:30pm ET after the US market close.
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stonks-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build.mjs

      - name: Commit refreshed site
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          git add index.html
          if [ -d data ]; then git add data; fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Strip build-only files from Pages artifact
        run: rm -rf node_modules

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
