name: Daily build

# Regenerates the baked per-ticker JSON (chains, AI news takes, technicals)
# twice a day. The commit it pushes triggers Vercel's GitHub integration,
# which deploys the new static files automatically — no Pages step here.
on:
  schedule:
    # 13:00 UTC weekdays — ~9:00am ET before the US market open.
    - cron: "0 13 * * 1-5"
    # 21:30 UTC daily — ~5:30pm ET after the US market close.
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stonks-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build.mjs

      - name: Commit refreshed site
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          git add index.html styles.css app.js
          if [ -d data ]; then git add data; fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
