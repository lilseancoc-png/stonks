name: Daily build

# Regenerates the baked per-ticker JSON (chains, AI news takes, technicals)
# three times a weekday. The commit it pushes triggers Vercel's GitHub
# integration, which deploys the new static files automatically.
on:
  schedule:
    # Three runs targeting ~9:00am, 12:30pm, and 5:30pm America/New_York.
    # GitHub cron is UTC-only, so each slot has two cron entries — one for
    # EDT (UTC-4) and one for EST (UTC-5). The `check` job gates the build
    # so exactly one run per slot per day executes regardless of DST regime.
    - cron: "0 13 * * 1-5"    # 9:00 ET (EDT) / 8:00 ET (EST)
    - cron: "0 14 * * 1-5"    # 10:00 ET (EDT) / 9:00 ET (EST)
    - cron: "30 16 * * 1-5"   # 12:30 ET (EDT) / 11:30 ET (EST)
    - cron: "30 17 * * 1-5"   # 13:30 ET (EDT) / 12:30 ET (EST)
    - cron: "30 21 * * *"     # 17:30 ET (EDT) / 16:30 ET (EST)
    - cron: "30 22 * * *"     # 18:30 ET (EDT) / 17:30 ET (EST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stonks-daily
  cancel-in-progress: false

jobs:
  check:
    # Drops the cron firing whose current ET hour isn't one of the three
    # intended slots (9, 12, 17). Manual workflow_dispatch always proceeds.
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          case "$ET_HOUR" in
            09|12|17)
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "ET hour $ET_HOUR matches a scheduled slot — proceeding."
              ;;
            *)
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "ET hour $ET_HOUR is not a scheduled slot — skipping this DST-duplicate firing."
              ;;
          esac

  build:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build.mjs

      - name: Commit refreshed site
        run: |
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          git add index.html styles.css app.js
          if [ -d data ]; then git add data; fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
