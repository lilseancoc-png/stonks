name: Daily build

# Regenerates the baked per-ticker JSON (chains, AI news takes, technicals)
# three times a weekday. The commit it pushes triggers Vercel's GitHub
# integration, which deploys the new static files automatically.
#
# Scheduling is handled externally by cron-job.org, which POSTs to the
# workflow_dispatch endpoint at 9:00, 12:00, and 17:00 America/New_York
# on weekdays. cron-job.org runs in ET so DST is handled by the service.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stonks-daily
  cancel-in-progress: false

jobs:
  check:
    # Drops the cron firing whose current ET hour isn't one of the three
    # intended slots (9, 12, 17). Manual workflow_dispatch always proceeds.
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.slot.outputs.proceed }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — proceeding."
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          case "$ET_HOUR" in
            09|12|17)
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "ET hour $ET_HOUR matches a scheduled slot — proceeding."
              ;;
            *)
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "ET hour $ET_HOUR is not a scheduled slot — skipping this DST-duplicate firing."
              ;;
          esac

  build:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Resolve the freshest tip of the dispatched ref at checkout
          # time (rather than the SHA pinned at dispatch time, which is
          # the @v5 default). Matters when concurrency:cancel-in-progress
          # is false: a run that sat in the queue while a PR merged to
          # main would otherwise build against the stale dispatch SHA
          # and then push its data/ output on top of the newer main —
          # data generated by old code, committed atop new code.
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Model selection is plumbed through Actions Variables so we can
          # swap models (Gemma free tier → Gemini 2.5 Flash-Lite on paid
          # Tier 1, etc.) without touching code. Unset = build.mjs falls
          # back to its hard-coded Gemma default.
          AI_MODEL: ${{ vars.AI_MODEL }}
          NARRATIVES_MODEL: ${{ vars.NARRATIVES_MODEL }}
          # Optional: when set, FRED fetches use api.stlouisfed.org (the
          # official JSON API, not Cloudflare-fronted) as the primary
          # path, with the public CSV endpoint as the fallback. Without
          # it, the build degrades gracefully — see fetchFredSeries in
          # scripts/build.mjs. Register a free key at
          # https://fred.stlouisfed.org/docs/api/api_key.html and add it
          # as a repo secret to populate macro events + Fed Funds rate
          # reliably from the GH Actions runner IPs.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/build.mjs

      - name: Commit refreshed site
        run: |
          set -euo pipefail
          git config user.name "stonks-bot"
          git config user.email "stonks-bot@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          # Retry the commit-and-push up to 3 times so a concurrent commit
          # to main (PR merge, hourly unusual-flow scan) doesn't fail the
          # whole 4-minute build. On each attempt we fetch fresh remote
          # state, reset the index/HEAD to it (working tree keeps our
          # freshly-built artifacts intact), then re-stage and push. This
          # avoids stash/rebase entirely because the daily build wipes and
          # regenerates data/ wholesale — there's nothing local worth
          # merging from the remote, only the new commit base to land on.
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git reset --mixed "origin/$BRANCH"
            git add index.html styles.css app.js
            if [ -d data ]; then git add data; fi
            if git diff --cached --quiet; then
              echo "No changes to commit (attempt $attempt)."
              exit 0
            fi
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — remote moved, retrying."
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
